<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLING RING AL SALOTTO</title>

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: sans-serif;
      color: white;
    }

    .header {
      text-align: center;
      padding: 100px 20px 60px;
      color: rgba(255,255,255,0.7);
    }

    .title {
      font-size: 14px;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 12px;
    }

    .details {
      font-size: 11px;
      max-width: 700px;
      margin: 0 auto;
      line-height: 1.5;
      opacity: 0.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 4px;
      padding: 4px;
    }

    .grid img {
      width: 100%;
      display: block;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }

    .grid img:hover {
      opacity: 0.9;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: #000;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      overflow: hidden;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      transition: opacity 0.4s ease, transform 0.4s ease;
      opacity: 0;
      transform: scale(0.98);
    }

    .lightbox img.show {
      opacity: 1;
      transform: scale(1);
    }

    .close {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 22px;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      z-index: 10000;
      transition: opacity 0.2s ease;
    }

    .close:hover {
      opacity: 1;
    }

    @media (max-width: 700px) {
      .header {
        padding: 70px 18px 40px;
      }

      .title {
        font-size: 13px;
      }

      .subtitle {
        font-size: 11px;
      }

      .details {
        font-size: 10px;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="title">BLING RING AL SALOTTO</div>
    <div class="subtitle">starring Benedetta, Juri, Margherita</div>
    <div class="details">
      Art Direction and Styling: Benedetta Berni, Juri Andreoni, Margherita Cassina —
      Photography: Margherita Bettinetti —
      Hair and Makeup: Studio 72 Monza —
      Location: Salotto Teodolinda
    </div>
  </div>

  <div class="grid" id="gallery"></div>

  <div class="lightbox" id="lightbox">
    <div class="close" id="closeBtn">×</div>
    <img id="lightboxImg" src="" alt="">
  </div>

  <script>
    const gallery = document.getElementById("gallery");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightboxImg");
    const closeBtn = document.getElementById("closeBtn");

    const images = [];

    for (let i = 1; i <= 299; i++) {
      const num = String(i).padStart(3, "0");
      const src = `image${num}.jpeg`;
      images.push(src);

      const img = document.createElement("img");
      img.src = src;
      img.loading = "lazy";
      img.addEventListener("click", () => openLightbox(i - 1));
      gallery.appendChild(img);
    }

    let currentIndex = 0;

    function showImage(index) {
      lightboxImg.classList.remove("show");

      setTimeout(() => {
        lightboxImg.src = images[index];
        lightboxImg.onload = () => {
          lightboxImg.classList.add("show");
        };
      }, 100);
    }

    function openLightbox(index) {
      currentIndex = index;
      lightbox.classList.add("active");
      document.body.style.overflow = "hidden";
      showImage(currentIndex);
    }

    function closeLightbox() {
      lightbox.classList.remove("active");
      document.body.style.overflow = "";
    }

    function next() {
      currentIndex = (currentIndex + 1) % images.length;
      showImage(currentIndex);
    }

    function prev() {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      showImage(currentIndex);
    }

    closeBtn.addEventListener("click", closeLightbox);

    lightbox.addEventListener("click", (e) => {
      if (e.target === closeBtn) return;

      const x = e.clientX;
      const width = window.innerWidth;

      if (x < width * 0.4) {
        prev();
      } else if (x > width * 0.6) {
        next();
      } else {
        closeLightbox();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (!lightbox.classList.contains("active")) return;

      if (e.key === "ArrowRight") next();
      if (e.key === "ArrowLeft") prev();
      if (e.key === "Escape") closeLightbox();
    });

    let touchStartX = 0;

    lightbox.addEventListener("touchstart", (e) => {
      touchStartX = e.touches[0].clientX;
    });

    lightbox.addEventListener("touchend", (e) => {
      const touchEndX = e.changedTouches[0].clientX;
      const diff = touchStartX - touchEndX;

      if (diff > 50) next();
      else if (diff < -50) prev();
    });
  </script>

</body>
</html>
